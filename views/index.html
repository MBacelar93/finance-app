<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Sistema de Gestão de Finanças Pessoais - Controle suas despesas e receitas">
    <title>Gestor de Finanças - Controle Financeiro Pessoal</title>
    <link rel="stylesheet" href="/css/style.css">
</head>
<body>
    <header class="app-header">
        <div class="header-content">
            <h1 class="app-title">Gestor de Finanças</h1>
            <p class="app-subititle">Controle seus gastos e receitas</p>
        </div>
    </header>

    <main class="app-main">
        <div class="container">
            <section class="summary-section">
                <h2>Reusmo Financeiro</h2>
                <div class="summary-cards" id="summary-container">
                    <div class="summary-card income">
                        <span class="summary-label">Receita Total</span>
                        <span class="summary-value" id="total-income">R$ 0,00</span>
                    </div>
                    <div class="summary-card expense">
                        <span class="summary-label">Despesa Total</span>
                        <span class="summary-value" id="total-expense">R$ 0,00</span>
                    </div>
                    <div class="sumarry-card balance">
                        <span class="summary-label">Saldo</span>
                        <span class="summary-value" id="total-balance">R$ 0,00</span>
                    </div>
                </div>
            </section>

            <section class="form-section">
                <h2>Adicionar Transação</h2>
                <form action="" id="transaction-form" class="transaction-form">
                    <div class="form-group">
                        <label for="type">Tipo *</label>
                        <select name="type" id="type" required>
                            <option value=" ">Seleceione um tipo</option>
                            <option value="income">Receita</option>
                            <option value="expense">Despesa</option>
                        </select>
                    </div>

                    <div class="form-group">
                        <label for="category">Categoria *</label>
                        <input type="text" name="category" id="category" placeholder="Ex: Alimentação, Transporte, Salário" required>
                    </div>

                    <div class="form-group">
                        <label for="description">Descrição</label>
                        <input type="text" name="description" id="description" placeholder="Compras no Supermercado">
                    </div>

                    <div class="form-group">
                        <label for="amount">Valor *</label>
                        <input type="number" id="amount" name="amount" placeholder="0.00" step="0.01" min="0" required>
                    </div>

                    <div class="form-group">
                        <label for="date">Data *</label>
                        <input type="date" name="date" id="date" required>
                    </div>

                    <button type="submit" class="" btn btn-primary>Adicionar</button>
                </form>

                <div id="form-message" class="form-message"></div>

            </section>

            <section class="transactions-section" id="transactions-list">
                <h2>Histórico de Transações</h2>

                <div id="transactions-list" class="transactions-list">
                    <p class="empty-message">Nenhuma transição adcionada ainda</p>
                </div>
            </section>
        </div>
    </main>
    <footer class="app-footer">
        <p>&copy; 2026 Gestor de Finanças. Desenvolvido para aprendizado.</p>
    </footer>
    <script src="/js/app.js"></script>
</body>
</html>
